    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // =========================================================
        // !!! 步驟一：請在這裡貼上您自己的 Firebase 配置 !!!
        // 請確保您移除或註解了 apiKey 和 authDomain，以保持安全。
        // =========================================================
        const firebaseConfig = {
            // apiKey: "YOUR_API_KEY",         // <--- 保持註解或移除，確保安全！
            // authDomain: "YOUR_AUTH_DOMAIN", // <--- 保持註解或移除，確保安全！
            projectId: "taiwanetf-tracker",   // <--- 必填，這是唯一連線依據    
        };
        // =========================================================

        const usageCountDisplay = document.getElementById('usage-count-display');
        const APP_ID = firebaseConfig.projectId; // 使用 projectId 作為 App ID
        const COUNT_DOC_PATH = `public_metrics/usage_count`; // Firestore 路徑

        async function updateUsageCount() {
            try {
                const app = initializeApp(firebaseConfig);
                const db = getFirestore(app);
                const auth = getAuth(app);

                // 1. 執行匿名登入以滿足 Firestore 規則 request.auth != null
                await signInAnonymously(auth);

                const countDocRef = doc(db, COUNT_DOC_PATH);

                // 2. 使用 transaction 來確保多個用戶同時訪問時計數準確
                await runTransaction(db, async (transaction) => {
                    const countDoc = await transaction.get(countDocRef);

                    let newCount = 1;
                    if (countDoc.exists()) {
                        const currentCount = countDoc.data().count;
                        newCount = currentCount + 1;
                    }

                    transaction.set(countDocRef, { count: newCount, lastUpdate: new Date().toISOString() });
                    
                    // 3. 成功後更新 UI
                    if (usageCountDisplay) {
                        usageCountDisplay.innerHTML = `<p class="text-sm font-semibold text-indigo-600">累積訪問人數: ${newCount.toLocaleString()}</p>`;
                    }
                });

            } catch (error) {
                console.error("Firestore Usage Count Error:", error);
                // 顯示錯誤訊息
                if (usageCountDisplay) {
                    usageCountDisplay.innerHTML = `<p class="text-sm text-red-600">❌ 無法連線或寫入統計服務 (請檢查 Firebase 配置與規則)</p>`;
                }
            }
        }

        // 檢查配置是否完整，如果沒有 ProjectId，就跳過
        if (firebaseConfig.projectId && firebaseConfig.projectId !== "YOUR_PROJECT_ID") {
            updateUsageCount();
        } else {
            if (usageCountDisplay) {
                usageCountDisplay.innerHTML = `<p class="text-sm text-yellow-600">⚠️ 應用程式數據統計服務未啟用 (缺少 Firebase 配置)</p>`;
            }
        }
    </script>
